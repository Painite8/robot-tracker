<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Companion Robot — Team Command Centre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');

  :root {
    --ink: #1f1b18;
    --paper: #fbf6f0;
    --card: #ffffff;
    --coral: #f0432b;
    --coral-soft: #fde4df;
    --teal: #1aa7a0;
    --teal-soft: #d6f0ee;
    --amber: #e9962f;
    --line: #e7ddd2;
    --muted: #8b8178;
    --display: 'Bricolage Grotesque', 'Trebuchet MS', sans-serif;
    --body: 'DM Sans', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); }

  #app {
    font-family: var(--body);
    color: var(--ink);
    background:
      radial-gradient(900px 500px at 12% -5%, var(--coral-soft) 0%, transparent 60%),
      radial-gradient(800px 600px at 95% 0%, var(--teal-soft) 0%, transparent 55%),
      var(--paper);
    min-height: 100vh;
    padding: 26px clamp(14px, 4vw, 48px) 60px;
  }

  .masthead { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 18px 28px; padding-bottom: 22px; border-bottom: 2px solid var(--ink); }
  .brand { flex: 1 1 320px; }
  .eyebrow { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--coral); font-weight: 700; }
  h1.title { font-family: var(--display); font-weight: 800; font-size: clamp(26px, 4.4vw, 44px); line-height: 1.02; letter-spacing: -0.02em; margin-top: 4px; }
  h1.title em { font-style: normal; color: var(--coral); }
  .subtitle { color: var(--muted); font-size: 13.5px; margin-top: 6px; max-width: 52ch; }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: stretch; }
  .ctl { background: var(--card); border: 1.5px solid var(--ink); border-radius: 10px; padding: 7px 11px; display: flex; flex-direction: column; gap: 2px; }
  .ctl label { font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .ctl select { font-family: var(--body); font-weight: 600; font-size: 13px; border: none; background: transparent; color: var(--ink); outline: none; cursor: pointer; }
  .savechip { display: flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600; color: var(--muted); align-self: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); }
  .dot.saving { background: var(--amber); animation: pulse 1s infinite; }
  .dot.err { background: var(--coral); }
  .dot.warn { background: var(--amber); }
  @keyframes pulse { 50% { opacity: .25; } }

  .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin: 22px 0 20px; }
  .tab { font-family: var(--display); font-weight: 600; font-size: 14px; padding: 9px 16px; border: 1.5px solid var(--line); background: var(--card); border-radius: 999px; cursor: pointer; transition: all .15s; color: var(--muted); }
  .tab:hover { border-color: var(--ink); color: var(--ink); }
  .tab.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .grid { display: grid; gap: 16px; }
  .card { background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 18px; }
  .card h3 { font-family: var(--display); font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .card .hint { font-size: 11.5px; color: var(--muted); }
  .section-label { font-family: var(--display); font-weight: 800; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; color: var(--coral); margin: 26px 0 12px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1.5px; background: var(--line); }

  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .stat { background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 16px; }
  .stat .num { font-family: var(--display); font-weight: 800; font-size: 34px; line-height: 1; }
  .stat .lab { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-top: 6px; }
  .stat.accent { background: var(--ink); color: var(--paper); }
  .stat.accent .lab { color: #c9beb3; }

  .ring-wrap { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 14px; }
  .ring-card { background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 16px 12px; text-align: center; }
  .ring { position: relative; width: 92px; height: 92px; margin: 0 auto 8px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 19px; }
  .ring-card .name { font-weight: 700; font-size: 12.5px; }
  .ring-card .sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; }

  .milestone { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 12px; background: var(--card); margin-bottom: 9px; }
  .milestone .wk { font-family: var(--display); font-weight: 800; font-size: 15px; background: var(--coral-soft); color: var(--coral); border-radius: 9px; padding: 8px 10px; min-width: 58px; text-align: center; }
  .milestone .wk.past { background: var(--teal-soft); color: var(--teal); }
  .milestone .wk.now { background: var(--ink); color: var(--paper); }
  .milestone .mname { font-family: var(--display); font-weight: 700; font-size: 14px; }
  .milestone .mmeta { font-size: 11.5px; color: var(--muted); }
  .milestone .countdown { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--coral); }

  .idea-add { display: flex; gap: 8px; margin-bottom: 12px; }
  .idea-add input { flex: 1; font-family: var(--body); font-size: 13px; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 9px; outline: none; }
  .idea-add input:focus { border-color: var(--coral); }
  .btn { font-family: var(--display); font-weight: 700; font-size: 13px; padding: 9px 16px; border-radius: 9px; border: 1.5px solid var(--ink); background: var(--ink); color: var(--paper); cursor: pointer; transition: transform .1s; }
  .btn:hover { transform: translateY(-1px); }
  .idea { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; margin-bottom: 7px; background: var(--card); }
  .idea .bullet { color: var(--coral); font-weight: 800; }
  .idea .txt { flex: 1; font-size: 13px; }
  .idea .by { font-size: 10.5px; color: var(--muted); }
  .idea .x { cursor: pointer; color: var(--muted); font-weight: 800; font-size: 16px; line-height: 1; padding: 0 4px; }
  .idea .x:hover { color: var(--coral); }

  .phase-head { display: flex; align-items: center; gap: 12px; margin: 22px 0 10px; }
  .phase-head .pdot { width: 13px; height: 13px; border-radius: 4px; }
  .phase-head .pname { font-family: var(--display); font-weight: 800; font-size: 16px; }
  .phase-head .pprog { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--muted); }

  .task { background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 8px; border-left-width: 5px; }
  .task-top { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; }
  .task .tname { font-weight: 700; font-size: 13.5px; flex: 1 1 220px; }
  .badge { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .badge.wk { background: var(--paper); border: 1.5px solid var(--line); color: var(--muted); }
  .badge.own { background: var(--teal-soft); color: var(--teal); }
  .task select.status { font-family: var(--body); font-weight: 700; font-size: 11.5px; padding: 4px 8px; border-radius: 7px; border: 1.5px solid var(--line); cursor: pointer; outline: none; }
  .task-bar { display: flex; align-items: center; gap: 10px; margin-top: 9px; }
  .task-bar input[type=range] { flex: 1; accent-color: var(--coral); cursor: pointer; }
  .task-bar .pv { font-family: var(--display); font-weight: 800; font-size: 12.5px; min-width: 38px; text-align: right; }
  .task textarea { width: 100%; margin-top: 9px; font-family: var(--body); font-size: 12px; padding: 8px 10px; border: 1.5px solid var(--line); border-radius: 8px; resize: vertical; min-height: 34px; outline: none; }
  .task textarea:focus { border-color: var(--coral); }
  .task .updby { font-size: 10px; color: var(--muted); margin-top: 5px; }

  .member { background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 16px; }
  .member-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar { width: 42px; height: 42px; border-radius: 11px; background: var(--ink); color: var(--paper); font-family: var(--display); font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .member-head .mn { font-family: var(--display); font-weight: 700; font-size: 15px; }
  .member-head .mr { font-size: 11px; color: var(--muted); }
  .member-head .mp { margin-left: auto; font-family: var(--display); font-weight: 800; font-size: 22px; }
  .progbar { height: 7px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
  .progbar > div { height: 100%; background: var(--coral); border-radius: 99px; transition: width .4s; }
  .mtask { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 12px; }
  .mtask:last-child { border-bottom: none; }
  .mtask .sdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .mtask .mt-name { flex: 1; }
  .mtask .mt-st { font-size: 10px; color: var(--muted); font-weight: 700; }

  .map-wrap { background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 8px; overflow-x: auto; }
  .map-wrap svg { display: block; min-width: 760px; width: 100%; height: auto; }
  .map-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 12px; }
  .map-legend span { font-size: 11.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .map-legend i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

  .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-family: var(--display); font-weight: 600; }
  .banner { border-radius: 11px; padding: 11px 14px; margin-bottom: 16px; font-size: 12.5px; font-weight: 600; line-height: 1.45; }
  .banner.warn { background: #fff3df; border: 1.5px solid var(--amber); color: #9a6510; }

  @media (max-width: 560px) {
    .controls { width: 100%; }
    .task .tname { flex-basis: 100%; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <div class="brand">
      <div class="eyebrow">Final Year Project &middot; Command Centre</div>
      <h1 class="title">AI Companion <em>Robot</em></h1>
      <div class="subtitle">Autonomous patient-monitoring robot with assistive lifting mechanism. Live shared tracker &mdash; every teammate's edits sync in real time.</div>
    </div>
    <div class="controls">
      <div class="ctl">
        <label>You are</label>
        <select id="userSel"></select>
      </div>
      <div class="ctl">
        <label>Project week</label>
        <select id="weekSel"></select>
      </div>
      <div class="savechip"><span class="dot saving" id="saveDot"></span><span id="saveTxt">Connecting…</span></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="view"><div class="loading">Connecting to the live project database…</div></div>
</div>

<script>

  // ---------- Static reference data ----------

  ];

  var PHASES = [
    { id: "plan",  name: "Planning & Design",      color: "#3f7bd6" },
    { id: "hw",    name: "Hardware Development",    color: "#2f9e54" },
    { id: "sw",    name: "Software Development",    color: "#7a55c9" },
    { id: "test",  name: "Integration & Testing",  color: "#e9962f" },
    { id: "final", name: "Finalization",           color: "#f0432b" }
  ];

  var DEFAULT_TASKS = [
    { id: "t1",  ph: "plan",  name: "Project kick-off & scope definition",          owner: "all",  sw: 1,  ew: 1 },
    { id: "t2",  ph: "plan",  name: "Requirements gathering & analysis",            owner: "lee",  sw: 1,  ew: 2 },
    { id: "t3",  ph: "plan",  name: "System architecture design",                  owner: "jon",  sw: 1,  ew: 2 },
    { id: "t4",  ph: "plan",  name: "Hardware component selection & procurement",   owner: "murt", sw: 2,  ew: 3 },
    { id: "t5",  ph: "plan",  name: "Budget & resource planning (BOM)",             owner: "lee",  sw: 1,  ew: 1 },
    { id: "t6",  ph: "hw",    name: "Chassis & frame fabrication",                 owner: "murt", sw: 3,  ew: 5 },
    { id: "t7",  ph: "hw",    name: "Drive system (motors + wheels) setup",         owner: "chung",sw: 3,  ew: 4 },
    { id: "t8",  ph: "hw",    name: "Lifting mechanism — mechanical design",        owner: "ali",  sw: 3,  ew: 5 },
    { id: "t9",  ph: "hw",    name: "Lifting mechanism — fabrication & bench test", owner: "ali",  sw: 5,  ew: 7 },
    { id: "t10", ph: "hw",    name: "Sensor suite integration (ultrasonic, IR, IMU)",owner: "chung",sw: 4, ew: 6 },
    { id: "t11", ph: "hw",    name: "Camera & vision hardware mounting",            owner: "jon",  sw: 4,  ew: 5 },
    { id: "t12", ph: "hw",    name: "Power system & battery management",            owner: "murt", sw: 5,  ew: 6 },
    { id: "t13", ph: "sw",    name: "Autonomous navigation & path planning",        owner: "jon",  sw: 3,  ew: 6 },
    { id: "t14", ph: "sw",    name: "Indoor localisation & patient-following logic",owner: "jon",  sw: 5,  ew: 7 },
    { id: "t15", ph: "sw",    name: "Obstacle avoidance algorithm",                 owner: "chung",sw: 4,  ew: 6 },
    { id: "t16", ph: "sw",    name: "Computer vision model — fall detection",       owner: "lee",  sw: 4,  ew: 7 },
    { id: "t17", ph: "sw",    name: "Emergency detection & real-time alerting",     owner: "lee",  sw: 6,  ew: 8 },
    { id: "t18", ph: "sw",    name: "Medication reminder scheduling system",        owner: "murt", sw: 5,  ew: 7 },
    { id: "t19", ph: "sw",    name: "Caregiver dashboard — frontend UI",            owner: "ali",  sw: 5,  ew: 8 },
    { id: "t20", ph: "sw",    name: "Caregiver dashboard — backend & API",          owner: "ali",  sw: 6,  ew: 9 },
    { id: "t21", ph: "sw",    name: "Remote monitoring & notification pipeline",    owner: "lee",  sw: 7,  ew: 9 },
    { id: "t22", ph: "test",  name: "Hardware–software integration",               owner: "all",  sw: 8,  ew: 10 },
    { id: "t23", ph: "test",  name: "Navigation & obstacle avoidance testing",      owner: "jon",  sw: 9,  ew: 10 },
    { id: "t24", ph: "test",  name: "Fall detection accuracy testing",              owner: "lee",  sw: 9,  ew: 10 },
    { id: "t25", ph: "test",  name: "Lifting mechanism functional testing",         owner: "ali",  sw: 9,  ew: 10 },
    { id: "t26", ph: "test",  name: "Medication reminder end-to-end testing",       owner: "murt", sw: 9,  ew: 10 },
    { id: "t27", ph: "test",  name: "Caregiver dashboard integration testing",      owner: "chung",sw: 10, ew: 11 },
    { id: "t28", ph: "test",  name: "Full system regression & stress testing",      owner: "all",  sw: 10, ew: 11 },
    { id: "t29", ph: "final", name: "Bug fixes & performance refinements",          owner: "all",  sw: 11, ew: 12 },
    { id: "t30", ph: "final", name: "User / pilot run evaluation",                  owner: "all",  sw: 11, ew: 12 },
    { id: "t31", ph: "final", name: "Technical documentation & report writing",     owner: "lee",  sw: 11, ew: 13 },
    { id: "t32", ph: "final", name: "Presentation deck preparation",                owner: "chung",sw: 12, ew: 13 },
    { id: "t33", ph: "final", name: "Final project demo & submission",              owner: "all",  sw: 13, ew: 14 }
  ];

  var MILESTONES = [
    { wk: 3,  name: "Proposal Presentation", meta: "Aim, objectives, lit review, methodology" },
    { wk: 7,  name: "Midpoint Presentation", meta: "Working subsystems demonstrated" },
    { wk: 13, name: "Final Presentation",    meta: "Full integrated system demo" },
    { wk: 14, name: "Poster Presentation",   meta: "Project showcase & submission" }
  ];

  var MAP = {
    branches: [
      { name: "Mobility & Navigation", color: "#3f7bd6",
        leaves: ["Differential drive", "Ultrasonic obstacle avoidance", "Wi-Fi RSSI localisation", "Patient-following logic"] },
      { name: "Lifting Mechanism", color: "#2f9e54",
        leaves: ["Scissor-lift actuator", "Pill dispenser delivery", "Water cup delivery", "Load & accuracy testing"] },
      { name: "AI & Vision", color: "#7a55c9",
        leaves: ["Fall detection (CV)", "Face recognition", "IMU sensor fusion", "Voice command engine"] },
      { name: "Alerts & Dashboard", color: "#e9962f",
        leaves: ["Emergency SMS / app alert", "Caregiver web dashboard", "Medication adherence log", "Activity & event history"] },
      { name: "Power System", color: "#1aa7a0",
        leaves: ["Battery sizing (8h runtime)", "Voltage regulation", "Auto-docking", "Low-power standby"] },
      { name: "Project & Docs", color: "#f0432b",
        leaves: ["Bill of Materials (<RM1000)", "Technical drawings", "EAC documentation", "Testing & evaluation"] }
    ]
  };

  var STATUS = {
    todo:    { label: "Not started", color: "#b4aaa0" },
    active:  { label: "In progress", color: "#e9962f" },
    blocked: { label: "Blocked",     color: "#f0432b" },
    done:    { label: "Done",        color: "#1aa7a0" }
  };

  var TABS = [
    { id: "overview", label: "Overview" },
    { id: "tasks",    label: "Tasks" },
    { id: "team",     label: "Team" },
    { id: "map",      label: "Mind Map" },
    { id: "timeline", label: "Timeline" }
  ];

  // ---------- State ----------
  var data = { tasks: [], ideas: [], week: 1 };
  var currentUser = "";
  var currentTab = "overview";
  var firstRender = false;
  var connMode = "connecting";   // connecting | live | offline | failed
  var fb = null;                 // firebase database module
  var db = null;                 // database instance

  // ---------- Helpers ----------
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }
  function memberName(id) { var m = MEMBERS.filter(function (x) { return x.id === id; })[0]; return m ? m.name : id; }
  function phaseProg(phId) {
    var ts = data.tasks.filter(function (t) { return t.ph === phId; });
    if (!ts.length) return 0;
    return Math.round(ts.reduce(function (a, t) { return a + t.progress; }, 0) / ts.length);
  }
  function overallProg() {
    if (!data.tasks.length) return 0;
    return Math.round(data.tasks.reduce(function (a, t) { return a + t.progress; }, 0) / data.tasks.length);
  }
  function memberProg(mid) {
    var ts = data.tasks.filter(function (t) { return t.owner === mid; });
    if (!ts.length) return 0;
    return Math.round(ts.reduce(function (a, t) { return a + t.progress; }, 0) / ts.length);
  }
  function esc(s) { return (s || "").replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
  function whoami() { return currentUser ? memberName(currentUser) : "someone"; }

  // ---------- Build local data from a Firebase snapshot ----------
  function buildTasks(stateMap) {
    stateMap = stateMap || {};
    return DEFAULT_TASKS.map(function (d) {
      var s = stateMap[d.id] || {};
      return {
        id: d.id, ph: d.ph, name: d.name, owner: d.owner, sw: d.sw, ew: d.ew,
        status: s.status || "todo",
        progress: typeof s.progress === "number" ? s.progress : 0,
        notes: s.notes || "",
        updby: s.updby || ""
      };
    });
  }
  function applySnapshot(val) {
    val = val || {};
    data.week = typeof val.week === "number" ? val.week : 1;
    data.tasks = buildTasks(val.tasks);
    var ideas = [];
    var io = val.ideas || {};
    Object.keys(io).forEach(function (k) {
      var v = io[k] || {};
      ideas.push({ key: k, text: v.text || "", by: v.by || "anon", at: v.at || 0 });
    });
    ideas.sort(function (a, b) { return b.at - a.at; });
    data.ideas = ideas;
  }

  // ---------- Writes ----------
  function fbReady() { return !!(fb && db); }
  function writeTask(t) {
    if (!fbReady()) return;
    fb.set(fb.ref(db, "tracker/tasks/" + t.id), {
      status: t.status, progress: t.progress, notes: t.notes, updby: t.updby
    });
  }
  function writeWeek(w) { if (fbReady()) fb.set(fb.ref(db, "tracker/week"), w); }
  function writeIdea(key, obj) { if (fbReady()) fb.set(fb.ref(db, "tracker/ideas/" + key), obj); }
  function deleteIdea(key) { if (fbReady()) fb.remove(fb.ref(db, "tracker/ideas/" + key)); }

  // ---------- Status chip ----------
  function updateStatus() {
    var dot = document.getElementById("saveDot");
    var txt = document.getElementById("saveTxt");
    if (!dot) return;
    if (connMode === "live")        { dot.className = "dot";       txt.textContent = "Live · synced"; }
    else if (connMode === "offline"){ dot.className = "dot warn";  txt.textContent = "Offline — will sync"; }
    else if (connMode === "failed") { dot.className = "dot err";   txt.textContent = "Local only"; }
    else                            { dot.className = "dot saving";txt.textContent = "Connecting…"; }
  }

  // ---------- Ring ----------
  function ring(pct, color) {
    var r = 38, c = 2 * Math.PI * r, off = c * (1 - pct / 100);
    return '<div class="ring"><svg width="92" height="92" viewBox="0 0 92 92">' +
      '<circle cx="46" cy="46" r="' + r + '" fill="none" stroke="#ece3d8" stroke-width="9"/>' +
      '<circle cx="46" cy="46" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="9" ' +
      'stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '"/>' +
      '</svg><div class="pct">' + pct + '%</div></div>';
  }

  // ---------- Views ----------
  function viewOverview() {
    var wrap = el("div");
    var done = data.tasks.filter(function (t) { return t.status === "done"; }).length;
    var active = data.tasks.filter(function (t) { return t.status === "active"; }).length;
    var blocked = data.tasks.filter(function (t) { return t.status === "blocked"; }).length;

    var sr = el("div", "stat-row");
    sr.appendChild(el("div", "stat accent", '<div class="num">' + overallProg() + '%</div><div class="lab">Overall progress</div>'));
    sr.appendChild(el("div", "stat", '<div class="num">' + done + '<span style="font-size:18px;color:var(--muted)">/' + data.tasks.length + '</span></div><div class="lab">Tasks done</div>'));
    sr.appendChild(el("div", "stat", '<div class="num">' + active + '</div><div class="lab">In progress</div>'));
    sr.appendChild(el("div", "stat", '<div class="num" style="color:' + (blocked ? "var(--coral)" : "inherit") + '">' + blocked + '</div><div class="lab">Blocked</div>'));
    sr.appendChild(el("div", "stat", '<div class="num">W' + data.week + '<span style="font-size:18px;color:var(--muted)">/14</span></div><div class="lab">Current week</div>'));
    wrap.appendChild(sr);

    wrap.appendChild(el("div", "section-label", "Progress by phase"));
    var rw = el("div", "ring-wrap");
    PHASES.forEach(function (p) {
      var n = data.tasks.filter(function (t) { return t.ph === p.id; }).length;
      var c = el("div", "ring-card");
      c.innerHTML = ring(phaseProg(p.id), p.color) + '<div class="name">' + p.name + '</div><div class="sub">' + n + ' tasks</div>';
      rw.appendChild(c);
    });
    wrap.appendChild(rw);

    wrap.appendChild(el("div", "section-label", "Milestones"));
    var mwrap = el("div");
    MILESTONES.forEach(function (m) {
      var d = el("div", "milestone");
      var cls = m.wk < data.week ? "past" : (m.wk === data.week ? "now" : "");
      var diff = m.wk - data.week;
      var cd = diff > 0 ? (diff + " week" + (diff > 1 ? "s" : "") + " away")
              : diff === 0 ? "This week" : "Passed";
      d.innerHTML = '<div class="wk ' + cls + '">W' + m.wk + '</div>' +
        '<div><div class="mname">' + m.name + '</div><div class="mmeta">' + m.meta + '</div></div>' +
        '<div class="countdown">' + cd + '</div>';
      mwrap.appendChild(d);
    });
    wrap.appendChild(mwrap);

    wrap.appendChild(el("div", "section-label", "Active this week (W" + data.week + ")"));
    var nowTasks = data.tasks.filter(function (t) {
      return t.sw <= data.week && t.ew >= data.week && t.status !== "done";
    });
    var nowCard = el("div", "card");
    if (!nowTasks.length) {
      nowCard.innerHTML = '<div class="hint">No open tasks scheduled for week ' + data.week + '. Adjust the project week selector at the top right.</div>';
    } else {
      var html = "";
      nowTasks.forEach(function (t) {
        var st = STATUS[t.status];
        html += '<div class="mtask"><span class="sdot" style="background:' + st.color + '"></span>' +
          '<span class="mt-name">' + esc(t.name) + '</span>' +
          '<span class="badge own">' + memberName(t.owner) + '</span>' +
          '<span class="mt-st">' + st.label + '</span></div>';
      });
      nowCard.innerHTML = html;
    }
    wrap.appendChild(nowCard);

    wrap.appendChild(el("div", "section-label", "Ideas & open questions"));
    var ic = el("div", "card");
    var add = el("div", "idea-add");
    add.innerHTML = '<input id="ideaInput" placeholder="Drop an idea, design question, or to-do for the team…" />' +
      '<button class="btn" id="ideaBtn">Add</button>';
    ic.appendChild(add);
    var list = el("div");
    if (!data.ideas.length) {
      list.appendChild(el("div", "hint", "No ideas yet — capture design thoughts, blockers, or questions here so the whole team sees them."));
    }
    data.ideas.forEach(function (idea) {
      var row = el("div", "idea");
      row.innerHTML = '<span class="bullet">&#9656;</span>' +
        '<span class="txt">' + esc(idea.text) + '<div class="by">— ' + esc(idea.by || "anon") + '</div></span>' +
        '<span class="x" data-key="' + idea.key + '">&times;</span>';
      list.appendChild(row);
    });
    ic.appendChild(list);
    wrap.appendChild(ic);

    setTimeout(function () {
      var inp = document.getElementById("ideaInput");
      var btn = document.getElementById("ideaBtn");
      function add() {
        var v = inp.value.trim();
        if (!v) return;
        var key = "k" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        var obj = { text: v, by: whoami(), at: Date.now() };
        data.ideas.unshift({ key: key, text: obj.text, by: obj.by, at: obj.at });
        render();
        writeIdea(key, obj);
      }
      if (btn) btn.onclick = add;
      if (inp) inp.onkeydown = function (e) { if (e.key === "Enter") add(); };
      list.querySelectorAll(".x").forEach(function (x) {
        x.onclick = function () {
          var key = x.getAttribute("data-key");
          data.ideas = data.ideas.filter(function (i) { return i.key !== key; });
          render();
          deleteIdea(key);
        };
      });
    }, 0);

    return wrap;
  }

  function viewTasks() {
    var wrap = el("div");
    PHASES.forEach(function (p) {
      var head = el("div", "phase-head");
      head.innerHTML = '<span class="pdot" style="background:' + p.color + '"></span>' +
        '<span class="pname">' + p.name + '</span>' +
        '<span class="pprog">' + phaseProg(p.id) + '% complete</span>';
      wrap.appendChild(head);

      data.tasks.filter(function (t) { return t.ph === p.id; }).forEach(function (t) {
        var st = STATUS[t.status];
        var card = el("div", "task");
        card.style.borderLeftColor = st.color;
        var optHtml = "";
        Object.keys(STATUS).forEach(function (k) {
          optHtml += '<option value="' + k + '"' + (k === t.status ? " selected" : "") + '>' + STATUS[k].label + '</option>';
        });
        card.innerHTML =
          '<div class="task-top">' +
            '<span class="tname">' + esc(t.name) + '</span>' +
            '<span class="badge wk">W' + t.sw + '–' + t.ew + '</span>' +
            '<span class="badge own">' + memberName(t.owner) + '</span>' +
            '<select class="status">' + optHtml + '</select>' +
          '</div>' +
          '<div class="task-bar">' +
            '<input type="range" min="0" max="100" step="5" value="' + t.progress + '">' +
            '<span class="pv">' + t.progress + '%</span>' +
          '</div>' +
          '<textarea placeholder="Notes, blockers, links…">' + esc(t.notes) + '</textarea>' +
          (t.updby ? '<div class="updby">Last updated by ' + esc(t.updby) + '</div>' : '');

        var sel = card.querySelector(".status");
        var rng = card.querySelector("input[type=range]");
        var pv = card.querySelector(".pv");
        var ta = card.querySelector("textarea");

        sel.onchange = function () {
          t.status = sel.value;
          if (t.status === "done") t.progress = 100;
          else if (t.status === "todo") t.progress = 0;
          else if (t.progress === 0 || t.progress === 100) t.progress = 25;
          t.updby = whoami();
          render();
          writeTask(t);
        };
        rng.oninput = function () { pv.textContent = rng.value + "%"; };
        rng.onchange = function () {
          t.progress = parseInt(rng.value, 10);
          if (t.progress === 100) t.status = "done";
          else if (t.progress === 0) t.status = "todo";
          else if (t.status === "todo" || t.status === "done") t.status = "active";
          t.updby = whoami();
          render();
          writeTask(t);
        };
        ta.onchange = function () {
          t.notes = ta.value;
          t.updby = whoami();
          writeTask(t);
        };
        wrap.appendChild(card);
      });
    });
    return wrap;
  }

  function viewTeam() {
    var wrap = el("div", "grid");
    wrap.style.gridTemplateColumns = "repeat(auto-fit, minmax(290px, 1fr))";
    MEMBERS.filter(function (m) { return m.id !== "all"; }).forEach(function (m) {
      var ts = data.tasks.filter(function (t) { return t.owner === m.id; });
      var prog = memberProg(m.id);
      var card = el("div", "member");
      var initials = m.short.slice(0, 2).toUpperCase();
      var head = '<div class="member-head">' +
        '<div class="avatar">' + initials + '</div>' +
        '<div><div class="mn">' + m.name + '</div><div class="mr">' + m.role + '</div></div>' +
        '<div class="mp">' + prog + '%</div></div>' +
        '<div class="progbar"><div style="width:' + prog + '%"></div></div>';
      var rows = "";
      ts.forEach(function (t) {
        var st = STATUS[t.status];
        rows += '<div class="mtask"><span class="sdot" style="background:' + st.color + '"></span>' +
          '<span class="mt-name">' + esc(t.name) + '</span>' +
          '<span class="mt-st">' + t.progress + '%</span></div>';
      });
      card.innerHTML = head + (rows || '<div class="hint">No solo-owned tasks.</div>');
      wrap.appendChild(card);
    });

    var shared = data.tasks.filter(function (t) { return t.owner === "all"; });
    var sc = el("div", "member");
    sc.style.gridColumn = "1 / -1";
    var srows = "";
    shared.forEach(function (t) {
      var st = STATUS[t.status];
      srows += '<div class="mtask"><span class="sdot" style="background:' + st.color + '"></span>' +
        '<span class="mt-name">' + esc(t.name) + '</span><span class="badge wk">W' + t.sw + '–' + t.ew + '</span>' +
        '<span class="mt-st">' + t.progress + '%</span></div>';
    });
    sc.innerHTML = '<div class="member-head"><div class="avatar" style="background:var(--coral)">ALL</div>' +
      '<div><div class="mn">Whole-Team Tasks</div><div class="mr">Everyone contributes</div></div>' +
      '<div class="mp">' + memberProg("all") + '%</div></div>' +
      '<div class="progbar"><div style="width:' + memberProg("all") + '%;background:var(--coral)"></div></div>' + srows;
    wrap.appendChild(sc);
    return wrap;
  }

  function viewMap() {
    var wrap = el("div");
    var W = 1000, H = 620, cx = W / 2, cy = H / 2;
    var ns = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);

    function wrapText(s, max) {
      if (s.length <= max) return s;
      var words = s.split(" "), line = "", out = [];
      words.forEach(function (w) {
        if ((line + " " + w).trim().length > max) { out.push(line.trim()); line = w; }
        else line += " " + w;
      });
      if (line.trim()) out.push(line.trim());
      return out.join("\n");
    }
    function node(x, y, w, h, fill, stroke, text, fs, fw, tc) {
      var g = document.createElementNS(ns, "g");
      var rect = document.createElementNS(ns, "rect");
      rect.setAttribute("x", x - w / 2); rect.setAttribute("y", y - h / 2);
      rect.setAttribute("width", w); rect.setAttribute("height", h);
      rect.setAttribute("rx", 11);
      rect.setAttribute("fill", fill);
      rect.setAttribute("stroke", stroke);
      rect.setAttribute("stroke-width", "2");
      g.appendChild(rect);
      var lines = text.split("\n");
      lines.forEach(function (ln, i) {
        var tx = document.createElementNS(ns, "text");
        tx.setAttribute("x", x);
        tx.setAttribute("y", y + (i - (lines.length - 1) / 2) * (fs + 2) + fs / 3);
        tx.setAttribute("text-anchor", "middle");
        tx.setAttribute("font-family", "DM Sans, sans-serif");
        tx.setAttribute("font-size", fs);
        tx.setAttribute("font-weight", fw);
        tx.setAttribute("fill", tc);
        tx.textContent = ln;
        g.appendChild(tx);
      });
      return g;
    }
    function curve(x1, y1, x2, y2, color) {
      var p = document.createElementNS(ns, "path");
      var mx = (x1 + x2) / 2;
      p.setAttribute("d", "M" + x1 + "," + y1 + " C" + mx + "," + y1 + " " + mx + "," + y2 + " " + x2 + "," + y2);
      p.setAttribute("fill", "none");
      p.setAttribute("stroke", color);
      p.setAttribute("stroke-width", "2.4");
      return p;
    }

    var n = MAP.branches.length;
    MAP.branches.forEach(function (b, i) {
      var ang = (i / n) * 2 * Math.PI - Math.PI / 2;
      var bx = cx + Math.cos(ang) * 235;
      var by = cy + Math.sin(ang) * 190;
      svg.appendChild(curve(cx, cy, bx, by, b.color));
      b.leaves.forEach(function (leaf, j) {
        var la = ang + (j - (b.leaves.length - 1) / 2) * (0.85 / b.leaves.length);
        var ldist = 150;
        var leafX = bx + Math.cos(la) * ldist;
        var leafY = by + Math.sin(la) * (ldist * 0.62);
        svg.appendChild(curve(bx, by, leafX, leafY, b.color + "99"));
        svg.appendChild(node(leafX, leafY, 132, 38, "#fff", b.color + "55", wrapText(leaf, 18), 9.5, "500", "#3a342f"));
      });
    });
    MAP.branches.forEach(function (b, i) {
      var ang = (i / n) * 2 * Math.PI - Math.PI / 2;
      var bx = cx + Math.cos(ang) * 235;
      var by = cy + Math.sin(ang) * 190;
      svg.appendChild(node(bx, by, 156, 44, b.color, b.color, b.name, 12, "700", "#fff"));
    });
    svg.appendChild(node(cx, cy, 168, 70, "#1f1b18", "#1f1b18", "AI COMPANION\nROBOT", 15, "800", "#fbf6f0"));

    var mw = el("div", "map-wrap");
    mw.appendChild(svg);
    wrap.appendChild(mw);

    var lg = el("div", "map-legend");
    MAP.branches.forEach(function (b) {
      lg.appendChild(el("span", null, '<i style="background:' + b.color + '"></i>' + b.name));
    });
    wrap.appendChild(lg);
    wrap.appendChild(el("div", "card", '<div class="hint">This map mirrors the six working subsystems of the robot. Use it to check that every branch has an owner and a matching task in the <strong>Tasks</strong> tab — if a leaf has no task, it is a gap.</div>'));
    return wrap;
  }

  function viewTimeline() {
    var wrap = el("div");
    wrap.appendChild(el("div", "card", '<div class="hint">14-week schedule from the project Gantt chart. The boxed column marks the current project week. Coloured bars are phase-coded; opacity reflects status.</div>'));
    var tl = el("div", "card");
    tl.style.overflowX = "auto";
    var inner = el("div");
    inner.style.minWidth = "640px";

    var hdr = el("div");
    hdr.style.cssText = "display:grid;grid-template-columns:220px repeat(14,1fr);gap:2px;margin-bottom:6px;";
    hdr.appendChild(el("div", null, ""));
    for (var w = 1; w <= 14; w++) {
      var cell = el("div", null, "W" + w);
      cell.style.cssText = "font-family:var(--display);font-weight:700;font-size:10px;text-align:center;padding:4px 0;border-radius:5px;" +
        (w === data.week ? "background:var(--ink);color:var(--paper);" : "color:var(--muted);");
      hdr.appendChild(cell);
    }
    inner.appendChild(hdr);

    PHASES.forEach(function (p) {
      data.tasks.filter(function (t) { return t.ph === p.id; }).forEach(function (t) {
        var row = el("div");
        row.style.cssText = "display:grid;grid-template-columns:220px repeat(14,1fr);gap:2px;margin-bottom:2px;align-items:center;";
        var label = el("div", null, esc(t.name));
        label.style.cssText = "font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;";
        row.appendChild(label);
        for (var w = 1; w <= 14; w++) {
          var c = el("div");
          var inSpan = w >= t.sw && w <= t.ew;
          var op = t.status === "done" ? 1 : t.status === "active" ? 0.7 : t.status === "blocked" ? 0.55 : 0.3;
          c.style.cssText = "height:15px;border-radius:3px;" +
            (inSpan ? "background:" + p.color + ";opacity:" + op + ";" : "background:transparent;") +
            (w === data.week ? "box-shadow:inset 1px 0 0 var(--ink),inset -1px 0 0 var(--ink);" : "");
          if (inSpan && t.status === "blocked") c.style.background = "var(--coral)";
          row.appendChild(c);
        }
        inner.appendChild(row);
      });
    });
    tl.appendChild(inner);
    wrap.appendChild(tl);

    var lg = el("div", "map-legend");
    PHASES.forEach(function (p) { lg.appendChild(el("span", null, '<i style="background:' + p.color + '"></i>' + p.name)); });
    lg.appendChild(el("span", null, '<i style="background:var(--coral)"></i>Blocked task'));
    wrap.appendChild(lg);
    return wrap;
  }

  // ---------- Render ----------
  function render() {
    var view = document.getElementById("view");
    if (!view) return;
    view.innerHTML = "";

    if (connMode === "failed") {
      view.appendChild(el("div", "banner warn",
        "Couldn't reach the live database — the tracker still works, but edits stay on this device only. " +
        "Check your internet connection, or make sure the page is opened from its web link (not a downloaded file)."));
    } else if (connMode === "offline") {
      view.appendChild(el("div", "banner warn",
        "You're offline. Your edits are saved and will sync automatically once the connection returns."));
    }

    var content;
    if (currentTab === "overview") content = viewOverview();
    else if (currentTab === "tasks") content = viewTasks();
    else if (currentTab === "team") content = viewTeam();
    else if (currentTab === "map") content = viewMap();
    else content = viewTimeline();
    view.appendChild(content);

    document.querySelectorAll(".tab").forEach(function (t) {
      t.classList.toggle("on", t.getAttribute("data-id") === currentTab);
    });
    var ws = document.getElementById("weekSel");
    if (ws && ws.value != data.week) ws.value = data.week;
  }

  function buildChrome() {
    var tabsEl = document.getElementById("tabs");
    tabsEl.innerHTML = "";
    TABS.forEach(function (t) {
      var b = el("div", "tab", t.label);
      b.setAttribute("data-id", t.id);
      b.onclick = function () { currentTab = t.id; render(); };
      tabsEl.appendChild(b);
    });

    var us = document.getElementById("userSel");
    us.innerHTML = '<option value="">— pick your name —</option>';
    MEMBERS.filter(function (m) { return m.id !== "all"; }).forEach(function (m) {
      us.innerHTML += '<option value="' + m.id + '">' + m.name + '</option>';
    });
    us.onchange = function () { currentUser = us.value; };

    var ws = document.getElementById("weekSel");
    ws.innerHTML = "";
    for (var w = 1; w <= 14; w++) ws.innerHTML += '<option value="' + w + '">Week ' + w + '</option>';
    ws.value = data.week;
    ws.onchange = function () {
      data.week = parseInt(ws.value, 10);
      render();
      writeWeek(data.week);
    };
  }

  function firstPaint() {
    if (firstRender) return;
    firstRender = true;
    buildChrome();
    render();
    updateStatus();
  }

  // ---------- Connect to Firebase ----------
  function connect() {
    Promise.all([
      import(FB_BASE + "firebase-app.js"),
      import(FB_BASE + "firebase-database.js")
    ]).then(function (mods) {
      var appMod = mods[0];
      fb = mods[1];
      var app = appMod.initializeApp({ databaseURL: DB_URL });
      db = fb.getDatabase(app);

      fb.onValue(fb.ref(db, "tracker"), function (snap) {
        applySnapshot(snap.val());
        if (!firstRender) firstPaint();
        else render();
      }, function () {
        connMode = "failed";
        firstPaint();
      });

      fb.onValue(fb.ref(db, ".info/connected"), function (snap) {
        connMode = snap.val() ? "live" : "offline";
        updateStatus();
        // if we connected but the tracker listener hasn't painted yet, paint defaults
        if (connMode === "offline" && !firstRender) { applySnapshot(null); firstPaint(); }
      });
    }).catch(function () {
      connMode = "failed";
      applySnapshot(null);
      firstPaint();
    });

    // backstop: never leave the user staring at a loading screen
    setTimeout(function () {
      if (!firstRender) {
        if (connMode === "connecting") connMode = "failed";
        applySnapshot(null);
        firstPaint();
      }
    }, 9000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", connect);
  } else {
    connect();
  }
})();
</script>
</body>
