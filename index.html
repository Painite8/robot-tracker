<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Companion Robot — Team Command Centre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');

  :root {
    --ink:#1f1b18; --paper:#fbf6f0; --card:#ffffff;
    --coral:#f0432b; --coral-soft:#fde4df;
    --teal:#1aa7a0; --teal-soft:#d6f0ee;
    --amber:#e9962f; --line:#e7ddd2; --muted:#8b8178;
    --display:'Bricolage Grotesque','Trebuchet MS',sans-serif;
    --body:'DM Sans',-apple-system,sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:var(--paper); }

  #app {
    font-family:var(--body); color:var(--ink);
    background:
      radial-gradient(900px 500px at 12% -5%, var(--coral-soft) 0%, transparent 60%),
      radial-gradient(800px 600px at 95% 0%, var(--teal-soft) 0%, transparent 55%),
      var(--paper);
    min-height:100vh; padding:26px clamp(14px,4vw,48px) 60px;
  }

  .masthead { display:flex; flex-wrap:wrap; align-items:flex-end; gap:18px 28px; padding-bottom:22px; border-bottom:2px solid var(--ink); }
  .brand { flex:1 1 320px; }
  .eyebrow { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--coral); font-weight:700; }
  h1.title { font-family:var(--display); font-weight:800; font-size:clamp(26px,4.4vw,44px); line-height:1.02; letter-spacing:-.02em; margin-top:4px; }
  h1.title em { font-style:normal; color:var(--coral); }
  .subtitle { color:var(--muted); font-size:13.5px; margin-top:6px; max-width:52ch; }

  .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; }
  .ctl { background:var(--card); border:1.5px solid var(--ink); border-radius:10px; padding:7px 11px; display:flex; flex-direction:column; gap:2px; }
  .ctl.click { cursor:pointer; }
  .ctl.click:hover { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .ctl label { font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .ctl .val { font-family:var(--display); font-weight:700; font-size:13.5px; }
  .ctl .val .sw { font-weight:500; font-size:11px; color:var(--coral); margin-left:6px; }
  .savechip { display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:600; color:var(--muted); align-self:center; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--teal); }
  .dot.saving { background:var(--amber); animation:pulse 1s infinite; }
  .dot.err { background:var(--coral); }
  .dot.warn { background:var(--amber); }
  @keyframes pulse { 50% { opacity:.25; } }

  .tabs { display:flex; flex-wrap:wrap; gap:4px; margin:22px 0 18px; }
  .tab { font-family:var(--display); font-weight:600; font-size:14px; padding:9px 16px; border:1.5px solid var(--line); background:var(--card); border-radius:999px; cursor:pointer; transition:all .15s; color:var(--muted); }
  .tab:hover { border-color:var(--ink); color:var(--ink); }
  .tab.on { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* week strip */
  .weekstrip { background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:18px; }
  .ws-top { display:flex; flex-wrap:wrap; align-items:baseline; gap:6px 14px; margin-bottom:10px; }
  .ws-week { font-family:var(--display); font-weight:800; font-size:22px; color:var(--coral); }
  .ws-of { font-size:12px; color:var(--muted); font-weight:600; }
  .ws-range { font-size:12.5px; font-weight:600; }
  .ws-next { margin-left:auto; font-size:12px; font-weight:700; color:var(--ink); background:var(--coral-soft); border-radius:999px; padding:4px 12px; }
  .ws-pips { display:flex; gap:3px; align-items:flex-end; }
  .pip { flex:1; height:10px; border-radius:3px; background:#ece3d8; }
  .pip.past { background:var(--teal); }
  .pip.now { height:16px; background:var(--coral); }
  .pip.ms { box-shadow:0 0 0 2px var(--ink) inset; }

  .grid { display:grid; gap:16px; }
  .card { background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:18px; }
  .card .hint { font-size:11.5px; color:var(--muted); }
  .section-label { font-family:var(--display); font-weight:800; font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--coral); margin:24px 0 12px; display:flex; align-items:center; gap:10px; }
  .section-label .sl-btn { margin-left:auto; }
  .section-label .ln { flex:1; height:1.5px; background:var(--line); }

  .stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
  .stat { background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:16px; }
  .stat .num { font-family:var(--display); font-weight:800; font-size:34px; line-height:1; }
  .stat .lab { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-top:6px; }
  .stat.accent { background:var(--ink); color:var(--paper); }
  .stat.accent .lab { color:#c9beb3; }

  .ring-wrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:14px; }
  .ring-card { background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:16px 12px; text-align:center; }
  .ring { position:relative; width:92px; height:92px; margin:0 auto 8px; }
  .ring svg { transform:rotate(-90deg); }
  .ring .pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:800; font-size:19px; }
  .ring-card .name { font-weight:700; font-size:12.5px; }
  .ring-card .sub { font-size:10.5px; color:var(--muted); margin-top:2px; }

  .milestone { display:flex; align-items:center; gap:14px; padding:12px 14px; border:1.5px solid var(--line); border-radius:12px; background:var(--card); margin-bottom:9px; }
  .milestone .wk { font-family:var(--display); font-weight:800; font-size:15px; background:var(--coral-soft); color:var(--coral); border-radius:9px; padding:8px 10px; min-width:58px; text-align:center; }
  .milestone .wk.past { background:var(--teal-soft); color:var(--teal); }
  .milestone .wk.now { background:var(--ink); color:var(--paper); }
  .milestone .mname { font-family:var(--display); font-weight:700; font-size:14px; }
  .milestone .mmeta { font-size:11.5px; color:var(--muted); }
  .milestone .countdown { margin-left:auto; font-size:12px; font-weight:700; color:var(--coral); }

  .idea-add { display:flex; gap:8px; margin-bottom:12px; }
  .idea-add input { flex:1; font-family:var(--body); font-size:13px; padding:9px 12px; border:1.5px solid var(--line); border-radius:9px; outline:none; }
  .idea-add input:focus { border-color:var(--coral); }
  .btn { font-family:var(--display); font-weight:700; font-size:13px; padding:9px 16px; border-radius:9px; border:1.5px solid var(--ink); background:var(--ink); color:var(--paper); cursor:pointer; transition:transform .1s; }
  .btn:hover { transform:translateY(-1px); }
  .btn.ghost { background:var(--card); color:var(--ink); }
  .btn.sm { padding:6px 13px; font-size:12px; }
  .idea { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:7px; background:var(--card); }
  .idea .bullet { color:var(--coral); font-weight:800; }
  .idea .txt { flex:1; font-size:13px; }
  .idea .by { font-size:10.5px; color:var(--muted); }
  .idea .x { cursor:pointer; color:var(--muted); font-weight:800; font-size:16px; line-height:1; padding:0 4px; }
  .idea .x:hover { color:var(--coral); }

  .phase-head { display:flex; align-items:center; gap:12px; margin:22px 0 10px; }
  .phase-head .pdot { width:13px; height:13px; border-radius:4px; }
  .phase-head .pname { font-family:var(--display); font-weight:800; font-size:16px; }
  .phase-head .pprog { margin-left:auto; font-size:12px; font-weight:700; color:var(--muted); }

  .task { background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:8px; border-left-width:5px; }
  .task-top { display:flex; flex-wrap:wrap; gap:8px 10px; align-items:center; }
  .task .tname { font-weight:700; font-size:13.5px; flex:1 1 200px; }
  .badge { font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap; }
  .badge.wk { background:var(--paper); border:1.5px solid var(--line); color:var(--muted); }
  .badge.own { background:var(--teal-soft); color:var(--teal); }
  .badge.late { background:var(--coral-soft); border:1.5px solid var(--coral); color:var(--coral); }
  .task select.status { font-family:var(--body); font-weight:700; font-size:11.5px; padding:4px 8px; border-radius:7px; border:1.5px solid var(--line); cursor:pointer; outline:none; }
  .task-bar { display:flex; align-items:center; gap:10px; margin-top:9px; }
  .task-bar input[type=range] { flex:1; accent-color:var(--coral); cursor:pointer; }
  .task-bar .pv { font-family:var(--display); font-weight:800; font-size:12.5px; min-width:38px; text-align:right; }
  .task textarea { width:100%; margin-top:9px; font-family:var(--body); font-size:12px; padding:8px 10px; border:1.5px solid var(--line); border-radius:8px; resize:vertical; min-height:34px; outline:none; }
  .task textarea:focus { border-color:var(--coral); }
  .task .updby { font-size:10px; color:var(--muted); margin-top:5px; }
  .iconbtn { width:27px; height:27px; border-radius:7px; border:1.5px solid var(--line); background:#fff; cursor:pointer; font-size:12px; color:var(--muted); line-height:1; }
  .iconbtn:hover { border-color:var(--ink); color:var(--ink); }
  .iconbtn.del:hover { border-color:var(--coral); color:var(--coral); }

  /* edit form */
  .editform { background:#fff; border:2px solid var(--ink); border-radius:13px; padding:16px; margin-bottom:16px; }
  .ef-title { font-family:var(--display); font-weight:800; font-size:15px; margin-bottom:12px; }
  .ef-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:11px; }
  .ef-field { display:flex; flex-direction:column; gap:4px; }
  .ef-field.wide { grid-column:1 / -1; }
  .ef-field label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .fin { width:100%; padding:8px 10px; border:1.5px solid var(--line); border-radius:8px; font-family:var(--body); font-size:13px; outline:none; background:#fff; }
  .fin:focus { border-color:var(--coral); }
  textarea.fin { resize:vertical; min-height:54px; }
  .ef-actions { display:flex; gap:8px; margin-top:13px; }
  .ef-err { color:var(--coral); font-size:11.5px; font-weight:700; margin-top:8px; }

  /* plan */
  .action { display:flex; align-items:center; gap:11px; padding:11px 13px; border:1.5px solid var(--line); border-radius:11px; background:var(--card); margin-bottom:8px; }
  .action input[type=checkbox] { width:19px; height:19px; accent-color:var(--teal); cursor:pointer; flex-shrink:0; }
  .action .atext { flex:1; font-size:13px; font-weight:600; }
  .action.done .atext { text-decoration:line-through; color:var(--muted); }
  .decision { background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:15px; margin-bottom:10px; border-left:5px solid var(--amber); }
  .decision.resolved { border-left-color:var(--teal); }
  .decision .dhead { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .decision .dtitle { font-family:var(--display); font-weight:700; font-size:14px; flex:1 1 200px; }
  .decision .dctx { font-size:12px; color:var(--muted); margin:8px 0; line-height:1.5; }
  .decision textarea { width:100%; font-family:var(--body); font-size:12.5px; padding:9px 11px; border:1.5px solid var(--line); border-radius:8px; resize:vertical; min-height:46px; outline:none; }
  .decision textarea:focus { border-color:var(--coral); }
  .pill-btn { font-family:var(--display); font-weight:700; font-size:11px; padding:5px 12px; border-radius:999px; border:1.5px solid; cursor:pointer; white-space:nowrap; }
  .pill-btn.open { background:#fff3df; border-color:var(--amber); color:#9a6510; }
  .pill-btn.resolved { background:var(--teal-soft); border-color:var(--teal); color:var(--teal); }

  /* bom */
  .bom-wrap { overflow-x:auto; }
  .bom-table { width:100%; border-collapse:collapse; font-size:12px; }
  .bom-table th { font-family:var(--display); font-weight:700; font-size:10.5px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); text-align:left; padding:8px; border-bottom:2px solid var(--line); }
  .bom-table td { padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  .bom-table tr.bought td { background:#f3faf8; }
  .bom-table .sub { font-family:var(--display); font-weight:800; font-size:11px; color:var(--coral); text-transform:uppercase; letter-spacing:.04em; }
  .bom-table input[type=checkbox] { width:17px; height:17px; accent-color:var(--teal); cursor:pointer; }
  .bom-table input.actual { width:74px; font-family:var(--body); font-size:12px; padding:4px 6px; border:1.5px solid var(--line); border-radius:6px; outline:none; }
  .bom-table input.actual:focus { border-color:var(--coral); }
  .bom-table .num { text-align:right; font-variant-numeric:tabular-nums; }

  .member { background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:16px; }
  .member-head { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .avatar { width:42px; height:42px; border-radius:11px; background:var(--ink); color:var(--paper); font-family:var(--display); font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center; }
  .member-head .mn { font-family:var(--display); font-weight:700; font-size:15px; }
  .member-head .mr { font-size:11px; color:var(--muted); }
  .member-head .mp { margin-left:auto; font-family:var(--display); font-weight:800; font-size:22px; }
  .progbar { height:7px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:12px; }
  .progbar > div { height:100%; background:var(--coral); border-radius:99px; transition:width .4s; }
  .mtask { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line); font-size:12px; }
  .mtask:last-child { border-bottom:none; }
  .mtask .sdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .mtask .mt-name { flex:1; }
  .mtask .mt-st { font-size:10px; color:var(--muted); font-weight:700; }
  .mtask .iconbtn { width:22px; height:22px; font-size:10px; }

  /* mind map */
  .mm-scroll { background:var(--card); border:1.5px solid var(--line); border-radius:14px; overflow:auto; max-height:660px; }
  .mm-canvas { position:relative; width:1600px; height:1040px; }
  .mm-canvas svg.conns { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .mm-node { position:absolute; width:152px; min-height:46px; border-radius:11px; padding:9px 30px 9px 11px;
             font-size:11.5px; font-weight:600; cursor:grab; user-select:none; -webkit-user-select:none;
             box-shadow:0 2px 7px rgba(0,0,0,.13); display:flex; align-items:center; line-height:1.3; }
  .mm-node.dragging { cursor:grabbing; z-index:60; box-shadow:0 7px 18px rgba(0,0,0,.25); }
  .mm-node.center { font-family:var(--display); font-weight:800; font-size:13px; }
  .mm-btns { position:absolute; top:3px; right:3px; display:flex; gap:3px; }
  .mm-btn { width:18px; height:18px; border-radius:5px; border:none; font-size:12px; font-weight:800; cursor:pointer; line-height:1; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.85); color:#444; }
  .mm-btn:hover { background:#fff; }
  .mm-btn.del:hover { color:var(--coral); }

  .loading { text-align:center; padding:80px 20px; color:var(--muted); font-family:var(--display); font-weight:600; }
  .banner { border-radius:11px; padding:11px 14px; margin-bottom:16px; font-size:12.5px; font-weight:600; line-height:1.45; }
  .banner.warn { background:#fff3df; border:1.5px solid var(--amber); color:#9a6510; }
  .banner.info { background:var(--teal-soft); border:1.5px solid var(--teal); color:#0f6f6a; }

  /* gate */
  .gate { position:fixed; inset:0; background:rgba(31,27,24,.72); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
  .gate-card { background:var(--paper); border:2px solid var(--ink); border-radius:18px; padding:26px; max-width:420px; width:100%; }
  .gate-title { font-family:var(--display); font-weight:800; font-size:21px; }
  .gate-sub { font-size:12.5px; color:var(--muted); margin:6px 0 16px; line-height:1.5; }
  .gate-btns { display:flex; flex-direction:column; gap:8px; }
  .gate-btn { font-family:var(--display); font-weight:700; font-size:14px; padding:12px 14px; border-radius:11px; border:1.5px solid var(--ink); background:var(--card); color:var(--ink); cursor:pointer; text-align:left; transition:all .12s; }
  .gate-btn:hover { background:var(--ink); color:var(--paper); transform:translateX(3px); }

  @media (max-width:560px) {
    .controls { width:100%; }
    .task .tname { flex-basis:100%; }
    .ws-next { margin-left:0; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <div class="brand">
      <div class="eyebrow">Group Design Project &middot; Command Centre</div>
      <h1 class="title">AI Companion <em>Robot</em></h1>
      <div class="subtitle">Autonomous patient-monitoring robot with assistive lifting mechanism. Live shared tracker &mdash; everyone's edits sync in real time.</div>
    </div>
    <div class="controls">
      <div class="ctl click" id="userCtl">
        <label>You are</label>
        <div class="val" id="userDisp">— pick name —</div>
      </div>
      <div class="savechip"><span class="dot saving" id="saveDot"></span><span id="saveTxt">Connecting…</span></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="view"><div class="loading">Connecting to the live project database…</div></div>
</div>

<script>
(function () {
  "use strict";

  var DB_URL = "https://gdp-avalon-default-rtdb.asia-southeast1.firebasedatabase.app";
  var FB_BASE = "https://www.gstatic.com/firebasejs/10.12.0/";

  // Project Week 1 began Monday 11 May 2026; weeks run Mon–Sun.
  var PROJECT_START = new Date(2026, 4, 11);
  var TOTAL_WEEKS = 14;
  var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function computeWeek() {
    var wk = Math.floor((Date.now() - PROJECT_START.getTime()) / (7 * 864e5)) + 1;
    return Math.max(1, Math.min(TOTAL_WEEKS, wk));
  }
  function weekStart(w) { var d = new Date(PROJECT_START.getTime()); d.setDate(d.getDate() + (w - 1) * 7); return d; }
  function fmtRange(w) {
    var s = weekStart(w), e = new Date(s.getTime()); e.setDate(e.getDate() + 6);
    if (s.getMonth() === e.getMonth())
      return s.getDate() + "–" + e.getDate() + " " + MON[s.getMonth()] + " " + s.getFullYear();
    return s.getDate() + " " + MON[s.getMonth()] + " – " + e.getDate() + " " + MON[e.getMonth()] + " " + e.getFullYear();
  }

  // ===================== REFERENCE DATA =====================
  var MEMBERS = [
    { id:"lee", name:"Lee Ming Huei", role:"Vision & Documentation Lead", short:"Lee" },
    { id:"jon", name:"Jonathan Aliwarga", role:"Navigation & Architecture", short:"Jon" },
    { id:"chung", name:"Chung Zi Da", role:"Drive & Sensors", short:"Chung" },
    { id:"murt", name:"Murtaza Hussein", role:"Hardware & Power", short:"Murt" },
    { id:"ali", name:"Ali A. Madari", role:"Lifting Mechanism & Dashboard", short:"Ali" },
    { id:"all", name:"All Members", role:"Whole team", short:"Team" }
  ];
  var PHASES = [
    { id:"plan",  name:"Planning & Design",     color:"#3f7bd6" },
    { id:"hw",    name:"Hardware Development",   color:"#2f9e54" },
    { id:"sw",    name:"Software Development",   color:"#7a55c9" },
    { id:"test",  name:"Integration & Testing", color:"#e9962f" },
    { id:"final", name:"Finalization",          color:"#f0432b" }
  ];
  var DEFAULT_TASKS = [
    { id:"t1",ph:"plan",name:"Project kick-off & scope definition",owner:"all",sw:1,ew:1 },
    { id:"t2",ph:"plan",name:"Requirements gathering & analysis",owner:"lee",sw:1,ew:2 },
    { id:"t3",ph:"plan",name:"System architecture design",owner:"jon",sw:1,ew:2 },
    { id:"t4",ph:"plan",name:"Hardware component selection & procurement",owner:"murt",sw:2,ew:3 },
    { id:"t5",ph:"plan",name:"Budget & resource planning (BOM)",owner:"lee",sw:1,ew:1 },
    { id:"t6",ph:"hw",name:"Chassis & frame fabrication",owner:"murt",sw:3,ew:5 },

  function defaultMindmap() {

    var branches = [
      { n:"Mobility & Navigation",c:"#3f7bd6",leaves:["Differential drive","Ultrasonic obstacle avoidance","Wi-Fi RSSI localisation","Patient-following logic"] },
      { n:"Lifting Mechanism",c:"#2f9e54",leaves:["Scissor-lift / actuator","Pill dispenser delivery","Water cup delivery","Load & accuracy testing"] },

      { n:"Project & Docs",c:"#f0432b",leaves:["Bill of Materials","Technical drawings","EAC documentation","Testing & evaluation"] }
    ];
    var N = branches.length;
    branches.forEach(function (b, i) {
      var ang = (i/N)*2*Math.PI - Math.PI/2;
      var bx = cx + Math.cos(ang)*300, by = cy + Math.sin(ang)*235, bid = "b"+i;
      mm[bid] = { text:b.n, x:Math.round(bx), y:Math.round(by), parent:"c0", color:b.c, kind:"branch" };
      b.leaves.forEach(function (leaf, j) {
        var la = ang + (j-(b.leaves.length-1)/2)*0.55;
        mm[bid+"l"+j] = { text:leaf, x:Math.round(bx+Math.cos(la)*215), y:Math.round(by+Math.sin(la)*175), parent:bid, color:b.c, kind:"leaf" };
      });
    });
    return mm;
  }

  function fillBom(k,s){ s=s||{}; var d=DEF_BOM[k]||{};

  function applySnapshot(val){
    val = val || {};
    data.week = computeWeek();
    var seeded = !!(val.meta && val.meta.seeded);
    var tm=val.tasks||{}, am=val.actions||{}, dm=val.decisions||{}, bm=val.bom||{};
    var any = Object.keys(tm).length||Object.keys(am).length||Object.keys(dm).length||Object.keys(bm).length;
    data.needsSeed = !seeded && !any;          // truly empty -> seed defaults
    data.needsFlag = !seeded && any;           // old data exists -> just set the flag

    data.tasks = Object.keys(tm).map(function(k){return fillTask(k,tm[k]);});
    data.actions = Object.keys(am).map(function(k){return fillAction(k,am[k]);});
    data.decisions = Object.keys(dm).map(function(k){return fillDecision(k,dm[k]);});
    data.bom = Object.keys(bm).map(function(k){return fillBom(k,bm[k]);});

    var ideas=[], io=val.ideas||{};
    Object.keys(io).forEach(function(k){ var v=io[k]||{}; ideas.push({key:k,text:v.text||"",by:v.by||"anon",at:v.at||0}); });
    ideas.sort(function(a,b){return b.at-a.at;});
    data.ideas = ideas;

    data.mindmap = (val.mindmap && Object.keys(val.mindmap).length) ? val.mindmap : defaultMindmap();
  }

  // ===================== VIEW: TASKS =====================
  function taskCard(t){
    var st=STATUS[t.status];
    var card=el("div","task");
    card.style.borderLeftColor=st.color;
    var optHtml="";
    Object.keys(STATUS).forEach(function(k){ optHtml+='<option value="'+k+'"'+(k===t.status?" selected":"")+'>'+STATUS[k].label+'</option>'; });
    var late = (t.ew<data.week && t.status!=="done") ? '<span class="badge late">'+(data.week-t.ew)+' wk late</span>' : '';
    card.innerHTML=
      '<div class="task-top">'+
        '<span class="tname">'+esc(t.name)+'</span>'+
        '<span class="badge wk">W'+t.sw+'–'+t.ew+'</span>'+
        '<span class="badge own">'+memberName(t.owner)+'</span>'+ late +
        '<select class="status">'+optHtml+'</select>'+
        '<button class="iconbtn edit" title="Edit task">\u270e</button>'+
        '<button class="iconbtn del" title="Delete task">\u2715</button>'+
      '</div>'+
      '<div class="task-bar"><input type="range" min="0" max="100" step="5" value="'+t.progress+'"><span class="pv">'+t.progress+'%</span></div>'+
      '<textarea placeholder="Notes, blockers, links…">'+esc(t.notes)+'</textarea>'+
      (t.updby?'<div class="updby">Last updated by '+esc(t.updby)+'</div>':'');
    var sel=card.querySelector(".status"), rng=card.querySelector("input[type=range]"),
        pv=card.querySelector(".pv"), ta=card.querySelector("textarea");
    sel.onchange=function(){
      if(!requireUser()){ sel.value=t.status; return; }
      t.status=sel.value;
      if(t.status==="done")t.progress=100;
      else if(t.status==="todo")t.progress=0;
      else if(t.progress===0||t.progress===100)t.progress=25;
      t.updby=whoami(); render(); writeTask(t);
    };
    rng.oninput=function(){ pv.textContent=rng.value+"%"; };
    rng.onchange=function(){
      if(!requireUser()){ rng.value=t.progress; pv.textContent=t.progress+"%"; return; }
      t.progress=parseInt(rng.value,10);
      if(t.progress===100)t.status="done";
      else if(t.progress===0)t.status="todo";
      else if(t.status==="todo"||t.status==="done")t.status="active";
      t.updby=whoami(); render(); writeTask(t);
    };
    ta.onchange=function(){ if(!requireUser())return; t.notes=ta.value; t.updby=whoami(); writeTask(t); };
    card.querySelector(".edit").onclick=function(){ openTaskEditor(t.id); };
    card.querySelector(".del").onclick=function(){
      if(!requireUser())return;
      if(!window.confirm('Delete task "'+t.name+'"?'))return;
      data.tasks=data.tasks.filter(function(x){return x.id!==t.id;});
      render(); removeTask(t.id);
    };
    return card;
  }

  function viewBOM(){

    if(editor && editor.type==="bom") wrap.appendChild(bomFormPanel());

    var estTotal=data.bom.reduce(function(s,b){return s+b.unit*b.qty;},0);
    var spent=data.bom.reduce(function(s,b){ if(!b.bought)return s; return s+(b.actual!=null?b.actual:b.unit*b.qty); },0);
    var boughtN=data.bom.filter(function(b){return b.bought;}).length;

    var sr=el("div","stat-row");

    sr.appendChild(el("div","stat",'<div class="num">RM '+spent+'</div><div class="lab">Spent so far</div>'));

    sr.appendChild(el("div","stat",'<div class="num" style="color:'+(estTotal>1000?"var(--coral)":"var(--teal)")+'">RM '+(estTotal-1000)+'</div><div class="lab">vs RM1000 target</div>'));
    wrap.appendChild(sr);

    var bl=el("div","section-label");
    bl.appendChild(el("span",null,"Bill of materials"));

    var addB=el("button","btn sm sl-btn","+ Add item");

    bl.appendChild(addB);
    wrap.appendChild(bl);
    wrap.appendChild(el("div","banner warn","Prices are estimated Malaysian retail figures — confirm at purchase. Costs total automatically as you add or edit items."));

    var bw=el("div","bom-wrap");
    var table=el("table","bom-table");
    table.innerHTML='<thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Est. RM</th><th>Bought</th><th>Actual RM</th><th></th></tr></thead>';
    var tbody=el("tbody");
    var sorted=data.bom.slice().sort(function(a,b){ if(a.grp!==b.grp)return a.grp.localeCompare(b.grp); return a.id.localeCompare(b.id); });
    var lastGrp="";
    if(!sorted.length){
      var er=el("tr"); er.innerHTML='<td colspan="6"><div class="hint">No items yet — add your first component.</div></td>'; tbody.appendChild(er);
    }
    sorted.forEach(function(b){
      if(b.grp!==lastGrp){ lastGrp=b.grp; var gr=el("tr"); gr.innerHTML='<td colspan="6" class="sub">'+esc(b.grp)+'</td>'; tbody.appendChild(gr); }
      var tr=el("tr",b.bought?"bought":"");
      tr.innerHTML='<td>'+esc(b.item)+'</td><td class="num">'+b.qty+'</td><td class="num">'+(b.unit*b.qty)+'</td>'+
        '<td><input type="checkbox"'+(b.bought?" checked":"")+'></td>'+
        '<td><input class="actual" type="number" min="0" placeholder="—" value="'+(b.actual!=null?b.actual:"")+'"></td>'+
        '<td style="white-space:nowrap"><button class="iconbtn edit" title="Edit">\u270e</button> <button class="iconbtn del" title="Delete">\u2715</button></td>';
      var cb=tr.querySelector('input[type=checkbox]'), ac=tr.querySelector('input.actual');
      cb.onchange=function(){ if(!requireUser()){cb.checked=b.bought;return;} b.bought=cb.checked; b.updby=whoami(); render(); writeBom(b); };
      ac.onchange=function(){ if(!requireUser())return; var v=ac.value.trim(); b.actual=v===""?null:Math.max(0,parseFloat(v)||0); b.updby=whoami(); writeBom(b); };
      tr.querySelector(".edit").onclick=function(){ openBomEditor(b.id); };
      tr.querySelector(".del").onclick=function(){
        if(!requireUser())return;
        if(!window.confirm('Delete "'+b.item+'" from the BOM?'))return;
        data.bom=data.bom.filter(function(x){return x.id!==b.id;});
        render(); removeBom(b.id);
      };
      tbody.appendChild(tr);
    });
    var foot=el("tr");
    foot.innerHTML='<td colspan="2" style="font-weight:800;font-family:var(--display)">TOTAL</td>'+
      '<td class="num" style="font-weight:800;font-family:var(--display)">'+estTotal+'</td>'+
      '<td></td><td class="num" style="font-weight:800;font-family:var(--display)">'+spent+'</td><td></td>';
    tbody.appendChild(foot);
    table.appendChild(tbody);
    bw.appendChild(table);
    var card=el("div","card"); card.style.padding="10px"; card.appendChild(bw);
    wrap.appendChild(card);
    return wrap;
  }

  // ===================== VIEW: TEAM =====================
  function teamTaskRow(t){
    var st=STATUS[t.status];
    var row=el("div","mtask");
    row.innerHTML='<span class="sdot" style="background:'+st.color+'"></span>'+
      '<span class="mt-name">'+esc(t.name)+'</span>'+
      '<span class="badge wk">W'+t.sw+'–'+t.ew+'</span>'+
      '<span class="mt-st">'+t.progress+'%</span>'+
      '<button class="iconbtn edit" title="Edit">\u270e</button>'+
      '<button class="iconbtn del" title="Delete">\u2715</button>';
    row.querySelector(".edit").onclick=function(){ openTaskEditor(t.id); };
    row.querySelector(".del").onclick=function(){
      if(!requireUser())return;
      if(!window.confirm('Delete task "'+t.name+'"?'))return;
      data.tasks=data.tasks.filter(function(x){return x.id!==t.id;});
      render(); removeTask(t.id);
    };
    return row;
  }
  function viewTeam(){
    var wrap=el("div");
    if(editor && editor.type==="task") wrap.appendChild(taskFormPanel());
    var grid=el("div","grid");
    grid.style.gridTemplateColumns="repeat(auto-fit, minmax(290px, 1fr))";
    MEMBERS.filter(function(m){return m.id!=="all";}).forEach(function(m){
      var ts=sortedTasks().filter(function(t){return t.owner===m.id;});
      var card=el("div","member");
      var head=el("div","member-head");
      head.innerHTML='<div class="avatar">'+m.short.slice(0,2).toUpperCase()+'</div>'+
        '<div><div class="mn">'+m.name+'</div><div class="mr">'+m.role+'</div></div>'+
        '<div class="mp">'+memberProg(m.id)+'%</div>';
      card.appendChild(head);
      var pb=el("div","progbar"); pb.innerHTML='<div style="width:'+memberProg(m.id)+'%"></div>'; card.appendChild(pb);
      if(!ts.length) card.appendChild(el("div","hint","No tasks assigned."));
      ts.forEach(function(t){ card.appendChild(teamTaskRow(t)); });
      var addB=el("button","btn sm ghost","+ Add task for "+m.short);
      addB.style.marginTop="10px";
      addB.onclick=function(){ openTaskEditor(null,{owner:m.id}); };
      card.appendChild(addB);
      grid.appendChild(card);
    });
    // whole team
    var ts=sortedTasks().filter(function(t){return t.owner==="all";});
    var sc=el("div","member"); sc.style.gridColumn="1 / -1";
    var sh=el("div","member-head");
    sh.innerHTML='<div class="avatar" style="background:var(--coral)">ALL</div>'+
      '<div><div class="mn">Whole-Team Tasks</div><div class="mr">Everyone contributes</div></div>'+
      '<div class="mp">'+memberProg("all")+'%</div>';
    sc.appendChild(sh);
    var spb=el("div","progbar"); spb.innerHTML='<div style="width:'+memberProg("all")+'%;background:var(--coral)"></div>'; sc.appendChild(spb);
    if(!ts.length) sc.appendChild(el("div","hint","No whole-team tasks."));
    ts.forEach(function(t){ sc.appendChild(teamTaskRow(t)); });
    var addAll=el("button","btn sm ghost","+ Add whole-team task");
    addAll.style.marginTop="10px";
    addAll.onclick=function(){ openTaskEditor(null,{owner:"all"}); };
    sc.appendChild(addAll);
    grid.appendChild(sc);
    wrap.appendChild(grid);
    return wrap;
  }

  // ===================== VIEW: MIND MAP =====================
  function drawConnectors(){
    if(!mmSvg)return;
    while(mmSvg.firstChild)mmSvg.removeChild(mmSvg.firstChild);
    var ns="http://www.w3.org/2000/svg", mm=data.mindmap;
    Object.keys(mm).forEach(function(id){
      var n=mm[id]; if(!n.parent||!mm[n.parent])return;
      var p=mm[n.parent], path=document.createElementNS(ns,"path"), mx=(p.x+n.x)/2;
      path.setAttribute("d","M"+p.x+","+p.y+" C"+mx+","+p.y+" "+mx+","+n.y+" "+n.x+","+n.y);
      path.setAttribute("stroke",n.color); path.setAttribute("stroke-width","2.4");
      path.setAttribute("fill","none"); path.setAttribute("opacity","0.5");
      mmSvg.appendChild(path);
    });
  }
  function viewMap(){
    var wrap=el("div");
    wrap.appendChild(el("div","banner info",
      "Interactive mind map — <strong>drag</strong> a node to move it, <strong>+</strong> adds a child, <strong>×</strong> deletes a node and its children, <strong>double-click</strong> renames. Changes sync to the team."));
    var scroll=el("div","mm-scroll");
    var canvas=el("div","mm-canvas");
    var ns="http://www.w3.org/2000/svg";
    var svg=document.createElementNS(ns,"svg");
    svg.setAttribute("class","conns"); svg.setAttribute("viewBox","0 0 1600 1040");
    canvas.appendChild(svg); mmSvg=svg;
    var mm=data.mindmap;
    Object.keys(mm).forEach(function(id){
      var n=mm[id];
      var node=el("div","mm-node"+(n.kind==="center"?" center":""));
      node.setAttribute("data-id",id);
      if(n.kind==="leaf"){ node.style.background="#fff"; node.style.color="var(--ink)"; node.style.border="2px solid "+n.color; }
      else { node.style.background=n.color; node.style.color="#fff"; }
      node.style.left=(n.x-76)+"px"; node.style.top=(n.y-23)+"px";
      var label=el("span"); label.textContent=n.text; node.appendChild(label);
      var btns=el("div","mm-btns");
      var addB=el("button","mm-btn add","+"); addB.title="Add child"; btns.appendChild(addB);
      if(n.kind!=="center"){ var delB=el("button","mm-btn del","\u00d7"); delB.title="Delete"; btns.appendChild(delB); }
      node.appendChild(btns);
      addB.onclick=function(ev){
        ev.stopPropagation();
        if(!requireUser())return;
        var txt=window.prompt('New idea under "'+n.text+'":',""); if(txt==null)return;
        txt=txt.trim(); if(!txt)return;
        var nid=uid("n"), kind=n.kind==="center"?"branch":"leaf";
        var child={text:txt,x:n.x+180,y:n.y+70,parent:id,color:n.color,kind:kind};
        data.mindmap[nid]=child; render(); writeMindNode(nid,child);
      };
      if(n.kind!=="center"){
        node.querySelector(".del").onclick=function(ev){
          ev.stopPropagation();
          if(!requireUser())return;
          if(!window.confirm('Delete "'+n.text+'" and everything under it?'))return;
          var doomed=[id], queue=[id];
          while(queue.length){
            var cur=queue.shift();
            Object.keys(data.mindmap).forEach(function(k){
              if(data.mindmap[k].parent===cur && doomed.indexOf(k)<0){ doomed.push(k); queue.push(k); }
            });
          }
          doomed.forEach(function(k){ delete data.mindmap[k]; });
          render(); writeMindRemoval(doomed);
        };
      }
      node.ondblclick=function(ev){
        if(ev.target.closest(".mm-btn"))return;
        if(!requireUser())return;
        var txt=window.prompt("Rename node:",n.text); if(txt==null)return;
        txt=txt.trim(); if(!txt)return;
        n.text=txt; render(); writeMindNode(id,n);
      };
      node.addEventListener("pointerdown",function(ev){
        if(ev.target.closest(".mm-btn"))return;
        if(!requireUser())return;
        ev.preventDefault();
        mmDragging=true; node.classList.add("dragging");
        var sx=ev.clientX, sy=ev.clientY, ox=n.x, oy=n.y;
        function move(e){ n.x=ox+(e.clientX-sx); n.y=oy+(e.clientY-sy);
          node.style.left=(n.x-76)+"px"; node.style.top=(n.y-23)+"px"; drawConnectors(); }
        function up(){ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up);
          node.classList.remove("dragging"); mmDragging=false;
          n.x=Math.round(n.x); n.y=Math.round(n.y); writeMindNode(id,n); }
        window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
      });
      canvas.appendChild(node);
    });
    scroll.appendChild(canvas);
    wrap.appendChild(scroll);
    setTimeout(drawConnectors,0);
    return wrap;
  }

  // ===================== VIEW: TIMELINE =====================
  function viewTimeline(){
    var wrap=el("div");
    wrap.appendChild(el("div","card",'<div class="hint">14-week schedule — automatically reflects every task and its weeks. The boxed column marks the current week. This view is read-only; edit tasks from the Tasks or Team tab.</div>'));
    var tl=el("div","card"); tl.style.overflowX="auto";
    var inner=el("div"); inner.style.minWidth="640px";
    var hdr=el("div");
    hdr.style.cssText="display:grid;grid-template-columns:220px repeat(14,1fr);gap:2px;margin-bottom:6px;";
    hdr.appendChild(el("div",null,""));
    for(var w=1;w<=14;w++){
      var cell=el("div",null,"W"+w);
      cell.style.cssText="font-family:var(--display);font-weight:700;font-size:10px;text-align:center;padding:4px 0;border-radius:5px;"+(w===data.week?"background:var(--ink);color:var(--paper);":"color:var(--muted);");
      hdr.appendChild(cell);
    }
    inner.appendChild(hdr);
    var tasks=sortedTasks();
    if(!tasks.length) inner.appendChild(el("div","hint","No tasks to show."));
    tasks.forEach(function(t){
      var p=PHASES.filter(function(x){return x.id===t.ph;})[0]||PHASES[0];
      var row=el("div");
      row.style.cssText="display:grid;grid-template-columns:220px repeat(14,1fr);gap:2px;margin-bottom:2px;align-items:center;";
      var label=el("div",null,esc(t.name));
      label.style.cssText="font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;";
      row.appendChild(label);
      for(var w=1;w<=14;w++){
        var c=el("div");
        var inSpan=w>=t.sw&&w<=t.ew;
        var op=t.status==="done"?1:t.status==="active"?0.7:t.status==="blocked"?0.55:0.3;
        c.style.cssText="height:15px;border-radius:3px;"+(inSpan?"background:"+p.color+";opacity:"+op+";":"background:transparent;")+(w===data.week?"box-shadow:inset 1px 0 0 var(--ink),inset -1px 0 0 var(--ink);":"");
        if(inSpan&&t.status==="blocked")c.style.background="var(--coral)";
        row.appendChild(c);
      }
      inner.appendChild(row);
    });
    tl.appendChild(inner);
    wrap.appendChild(tl);
    var lg=el("div");
    lg.style.cssText="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;";
    PHASES.forEach(function(p){
      var s=el("span",null,'<i style="width:11px;height:11px;border-radius:3px;display:inline-block;background:'+p.color+'"></i> '+p.name);
      s.style.cssText="font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px;";
      lg.appendChild(s);
    });
    wrap.appendChild(lg);
    return wrap;
  }

  // ===================== RENDER =====================
  function render(){
    if(mmDragging) return;
    var view=document.getElementById("view");
    if(!view) return;
    data.week=computeWeek();
    mmSvg=null;
    view.innerHTML="";

    if(connMode==="failed") view.appendChild(el("div","banner warn",
      "Couldn't reach the live database — the tracker still works, but edits stay on this device only. Make sure the page is opened from its web link and you're online."));
    else if(connMode==="offline") view.appendChild(el("div","banner warn",
      "You're offline. Your edits are saved and will sync automatically once the connection returns."));

    view.appendChild(weekStrip());

    var content;
    if(currentTab==="overview") content=viewOverview();
    else if(currentTab==="tasks") content=viewTasks();
    else if(currentTab==="plan") content=viewPlan();
    else if(currentTab==="bom") content=viewBOM();
    else if(currentTab==="team") content=viewTeam();
    else if(currentTab==="map") content=viewMap();
    else content=viewTimeline();
    view.appendChild(content);

    document.querySelectorAll(".tab").forEach(function(t){
      t.classList.toggle("on",t.getAttribute("data-id")===currentTab);
    });
  }
  function remoteRender(){ if(mmDragging||editor) return; render(); }

  function buildChrome(){
    var tabsEl=document.getElementById("tabs");
    tabsEl.innerHTML="";
    TABS.forEach(function(t){
      var b=el("div","tab",t.label);
      b.setAttribute("data-id",t.id);
      b.onclick=function(){ if(currentTab!==t.id){ editor=null; } currentTab=t.id; render(); };
      tabsEl.appendChild(b);
    });
    var uc=document.getElementById("userCtl");
    if(uc) uc.onclick=showGate;
    updateUserDisp();
  }

  function firstPaint(){
    if(firstRender) return;
    firstRender=true;
    buildChrome();
    render();
    updateStatus();
    if(!currentUser) showGate();
  }

  // ===================== CONNECT =====================
  function connect(){
    currentUser=loadUser();
    Promise.all([
      import(FB_BASE+"firebase-app.js"),
      import(FB_BASE+"firebase-database.js")
    ]).then(function(mods){
      fb=mods[1];
      var app=mods[0].initializeApp({databaseURL:DB_URL});
      db=fb.getDatabase(app);
      fb.onValue(fb.ref(db,"tracker"),function(snap){
        applySnapshot(snap.val());
        if(!firstRender) firstPaint();
        else remoteRender();
        maybeSeed();
      },function(){ connMode="failed"; firstPaint(); });
      fb.onValue(fb.ref(db,".info/connected"),function(snap){
        connMode=snap.val()?"live":"offline";
        updateStatus();
        if(connMode==="offline"&&!firstRender){ applySnapshot(null); firstPaint(); }
      });
    }).catch(function(){
      connMode="failed"; applySnapshot(null); firstPaint();
    });
    setTimeout(function(){
      if(!firstRender){ if(connMode==="connecting")connMode="failed"; applySnapshot(null); firstPaint(); }
    },9000);
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",connect);
  else connect();
})();
</script>
</body>
</html>
